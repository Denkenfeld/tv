<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HAUSEN STREAM</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:100%; height:100%;
  background:#0d1018;
  color:#eee8d8;
  font-family: Georgia, serif;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

body {
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
#hdr {
  flex-shrink:0;
  background:#161b28;
  border-bottom:3px solid #f0a500;
  padding:10px 14px;
  text-align:center;
}
#hdr h1 {
  font-size:clamp(1rem,5.5vw,1.45rem);
  font-weight:bold;
  color:#f0a500;
  letter-spacing:.04em;
}

/* ── PLAYER ── */
#pwrap {
  flex:0 0 42%;
  position:relative;
  background:#000;
  overflow:hidden;
}
#vid {
  width:100%; height:100%;
  display:block;
  object-fit:contain;
  background:#000;
}

/* ── SPINNER ── */
#spin {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.55);
  pointer-events:none;
  opacity:0; transition:opacity .2s;
}
#spin.on { opacity:1; }
.ring {
  width:52px; height:52px;
  border:4px solid rgba(240,165,0,.2);
  border-top-color:#f0a500;
  border-radius:50%;
  animation:sp .8s linear infinite;
}
@keyframes sp { to { transform:rotate(360deg); } }

/* ── PLAY OVERLAY (only on first load) ── */
#playoverlay {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.5);
  cursor:pointer;
  z-index:10;
}
#playoverlay svg {
  width:80px; height:80px;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.6));
}
#playoverlay.hidden { display:none; }

/* ── subtitles off ── */
video::cue { display:none; }

/* ── 3x3 GRID ── */
#grid {
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:8px;
  padding:8px;
  min-height:0;
}

.cb {
  background:#1e2438;
  border:2px solid #2a3258;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:6px;
  touch-action:manipulation;
  user-select:none;
  -webkit-user-select:none;
  transition:background .1s, transform .08s;
}
.cb span {
  font-size:clamp(.72rem,3.8vw,1.05rem);
  font-weight:bold;
  color:#eee8d8;
  text-align:center;
  line-height:1.25;
  pointer-events:none;
}
.cb.active {
  background:#f0a500;
  border-color:#f0a500;
}
.cb.active span { color:#0d1018; }
.cb:active { transform:scale(.93); }

/* ── LANDSCAPE: pure CSS fullscreen, no JS fullscreen API ──
   In a saved WebApp there is no browser chrome, so this
   IS true fullscreen. Video keeps playing uninterrupted.   */
@media (orientation:landscape) {
  #hdr, #grid { display:none !important; }
  body { background:#000; }
  #pwrap {
    position:fixed !important;
    inset:0 !important;
    flex:none !important;
    width:100vw !important;
    height:100vh !important;
    z-index:999;
  }
  #vid { object-fit:contain; }
}
</style>
</head>
<body>

<div id="hdr"><h1>HAUSEN AM STREAM</h1></div>

<div id="pwrap">
  <video id="vid" playsinline muted></video>
  <div id="spin"><div class="ring"></div></div>
  <div id="playoverlay">
    <!-- big play triangle -->
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="50" fill="rgba(240,165,0,0.85)"/>
      <polygon points="38,28 38,72 74,50" fill="#0d1018"/>
    </svg>
  </div>
</div>

<div id="grid"></div>

<script>
var video   = document.getElementById('vid');
var spinEl  = document.getElementById('spin');
var overlay = document.getElementById('playoverlay');
var gridEl  = document.getElementById('grid');

var hlsPlayer = null;
var curIdx    = -1;
var started   = false;   /* has user pressed play at least once */

var channels = [
  { name:"ARD",     url:"https://daserste-live.ard-mcdn.de/daserste/live/hls/de/master.m3u8" },
  { name:"ZDF",     url:"https://zdf-hls-15.akamaized.net/hls/live/2016498/de/high/master.m3u8" },
  { name:"SWR BW",  url:"https://swrbwd-hls.akamaized.net/hls/live/2018672/swrbwd/master.m3u8" },
  { name:"PHOENIX", url:"https://zdf-hls-19.akamaized.net/hls/live/2016502/de/high/master.m3u8" },
  { name:"NDR",     url:"https://mcdn.ndr.de/ndr/hls/ndr_fs/ndr_nds/master.m3u8" },
  { name:"BR S\u00fcd",  url:"https://mcdn.br.de/br/fs/bfs_sued/hls/de/master.m3u8" },
  { name:"WDR",     url:"https://wdrfs247.akamaized.net/hls/live/681509/wdr_msl4_fs247/index.m3u8" },
  { name:"ARTE DE", url:"https://artesimulcast.akamaized.net/hls/live/2030993/artelive_de/index.m3u8" },
  { name:"3sat",    url:"https://zdf-hls-18.akamaized.net/hls/live/2016501/dach/high/master.m3u8" }
];

/* ── Load stream into HLS (muted, no play yet) ── */
function loadStream(url) {
  spinEl.classList.add('on');
  if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }

  if (window.Hls && Hls.isSupported()) {
    hlsPlayer = new Hls({ lowLatencyMode:true, maxBufferLength:30, backBufferLength:30 });
    hlsPlayer.loadSource(url);
    hlsPlayer.attachMedia(video);
    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
      hlsPlayer.subtitleTrack = -1;
      if (started) {
        video.muted = false;
        video.play().catch(function(){});
      }
      /* if not started yet: stream is buffered, waiting for user tap */
    });
    hlsPlayer.on(Hls.Events.ERROR, function(ev, d) {
      if (d.fatal) spinEl.classList.remove('on');
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    if (started) {
      video.muted = false;
      video.play().catch(function(){});
    }
  }
}

/* ── Switch active button highlight ── */
function setActive(idx) {
  if (curIdx >= 0) {
    var old = document.getElementById('b' + curIdx);
    if (old) old.classList.remove('active');
  }
  curIdx = idx;
  var btn = document.getElementById('b' + idx);
  if (btn) btn.classList.add('active');
}

/* ── First user interaction: unmute + play + hide overlay ── */
function firstStart() {
  started = true;
  overlay.classList.add('hidden');
  video.muted = false;
  video.play().catch(function(){});
}

/* ── Tap on play overlay ── */
overlay.addEventListener('touchstart', function(e) {
  e.preventDefault();
  firstStart();
}, { passive:false });
overlay.addEventListener('click', firstStart);

/* ── Build grid ── */
for (var i = 0; i < channels.length; i++) {
  (function(idx) {
    var btn = document.createElement('button');
    btn.className = 'cb';
    btn.id = 'b' + idx;
    var sp = document.createElement('span');
    sp.textContent = channels[idx].name;
    btn.appendChild(sp);

    function press(e) {
      if (e.cancelable) e.preventDefault();
      if (!started) {
        /* first tap on any button also starts playback */
        setActive(idx);
        loadStream(channels[idx].url);
        firstStart();
        return;
      }
      if (idx === curIdx) {
        /* same channel: toggle pause */
        video.paused ? video.play() : video.pause();
      } else {
        setActive(idx);
        loadStream(channels[idx].url);
      }
    }

    btn.addEventListener('touchstart', press, { passive:false });
    btn.addEventListener('click', press);
    gridEl.appendChild(btn);
  })(i);
}

video.addEventListener('playing', function() { spinEl.classList.remove('on'); });
video.addEventListener('waiting', function() { spinEl.classList.add('on'); });

/* ── On load: pre-buffer ARD silently, show play overlay ── */
window.onload = function() {
  setTimeout(function() {
    setActive(0);
    loadStream(channels[0].url);
  }, 300);
};
</script>
</body>
</html>
