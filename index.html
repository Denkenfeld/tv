<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HAUSEN AM STREAM</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  height:100%;
  background:#0d1018;
  color:#eee8d8;
  font-family: Georgia, serif;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

body {
  display:flex;
  flex-direction:column;
}

/* HEADER */
#hdr {
  flex-shrink:0;
  background:#161b28;
  border-bottom:3px solid #f0a500;
  padding:10px 14px;
  text-align:center;
}
#hdr h1 {
  font-size:clamp(1rem,5.5vw,1.45rem);
  font-weight:bold;
  color:#f0a500;
  letter-spacing:.04em;
}

/* PLAYER — 42% of remaining height */
#pwrap {
  flex:0 0 42%;
  position:relative;
  background:#000;
  overflow:hidden;
}
#vid {
  width:100%;
  height:100%;
  display:block;
  object-fit:contain;
  background:#000;
  /* no controls */
}

/* SPINNER */
#spin {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.55);
  pointer-events:none;
  opacity:0; transition:opacity .2s;
}
#spin.on { opacity:1; }
.ring {
  width:52px; height:52px;
  border:4px solid rgba(240,165,0,.2);
  border-top-color:#f0a500;
  border-radius:50%;
  animation:sp .8s linear infinite;
}
@keyframes sp { to { transform:rotate(360deg); } }



/* subtitles off */
video::cue { display:none; }

/* 3x3 GRID */
#grid {
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:8px;
  padding:8px;
  min-height:0;
}

.cb {
  background:#1e2438;
  border:2px solid #2a3258;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:6px;
  touch-action:manipulation;
  user-select:none;
  -webkit-user-select:none;
  transition:background .1s, transform .08s;
}
.cb span {
  font-size:clamp(.72rem,3.8vw,1.05rem);
  font-weight:bold;
  color:#eee8d8;
  text-align:center;
  line-height:1.25;
  pointer-events:none;
}
.cb.active {
  background:#f0a500;
  border-color:#f0a500;
}
.cb.active span { color:#0d1018; }
.cb:active { transform:scale(.93); }

/* LANDSCAPE — CSS hides UI (fallback if webkit fullscreen not available) */
@media (orientation:landscape) {
  #hdr, #now, #grid { display:none !important; }
  #pwrap {
    position:fixed !important;
    inset:0 !important;
    flex:none !important;
    width:100vw !important;
    height:100vh !important;
    z-index:999;
  }
}
</style>
</head>
<body>

<div id="hdr"><h1>HAUSEN AM STREAM</h1></div>

<div id="pwrap">
  <video id="vid" playsinline></video>
  <div id="spin" class="on"><div class="ring"></div></div>

</div>

<div id="grid"></div>

<script>
var video     = document.getElementById('vid');
var spinEl    = document.getElementById('spin');
var gridEl    = document.getElementById('grid');
var hlsPlayer = null;
var curIdx    = -1;

var channels = [
  { name:"ARD",     url:"https://daserste-live.ard-mcdn.de/daserste/live/hls/de/master.m3u8" },
  { name:"ZDF",     url:"https://zdf-hls-15.akamaized.net/hls/live/2016498/de/high/master.m3u8" },
  { name:"SWR BW",  url:"https://swrbwd-hls.akamaized.net/hls/live/2018672/swrbwd/master.m3u8" },
  { name:"PHOENIX", url:"https://zdf-hls-19.akamaized.net/hls/live/2016502/de/high/master.m3u8" },
  { name:"NDR",     url:"https://mcdn.ndr.de/ndr/hls/ndr_fs/ndr_nds/master.m3u8" },
  { name:"BR S\u00fcd",  url:"https://mcdn.br.de/br/fs/bfs_sued/hls/de/master.m3u8" },
  { name:"WDR",     url:"https://wdrfs247.akamaized.net/hls/live/681509/wdr_msl4_fs247/index.m3u8" },
  { name:"ARTE DE", url:"https://artesimulcast.akamaized.net/hls/live/2030993/artelive_de/index.m3u8" },
  { name:"3sat",    url:"https://zdf-hls-18.akamaized.net/hls/live/2016501/dach/high/master.m3u8" }
];

/* ── Play a channel (logic from reference code) ── */
function playChannel(url, name, idx) {
  spinEl.classList.add('on');

  if (curIdx >= 0) {
    var old = document.getElementById('b' + curIdx);
    if (old) old.classList.remove('active');
  }
  curIdx = idx;
  var btn = document.getElementById('b' + idx);
  if (btn) btn.classList.add('active');

  if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }

  if (Hls.isSupported()) {
    hlsPlayer = new Hls({ lowLatencyMode:true, maxBufferLength:30, backBufferLength:30 });
    hlsPlayer.loadSource(url);
    hlsPlayer.attachMedia(video);
    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
      hlsPlayer.subtitleTrack = -1;
      video.play().catch(function() {});
    });
    hlsPlayer.on(Hls.Events.ERROR, function(ev, d) {
      if (d.fatal) spinEl.classList.remove('on');
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // iOS Safari native HLS
    video.src = url;
    video.play().catch(function() {});
  }
}

video.addEventListener('playing', function() { spinEl.classList.remove('on'); });
video.addEventListener('waiting', function() { spinEl.classList.add('on'); });

/* ── Build grid ── */
for (var i = 0; i < channels.length; i++) {
  (function(idx) {
    var btn = document.createElement('button');
    btn.className = 'cb';
    btn.id = 'b' + idx;
    var sp = document.createElement('span');
    sp.textContent = channels[idx].name;
    btn.appendChild(sp);

    function press(e) {
      if (e.cancelable) e.preventDefault();
      if (idx === curIdx) {
        video.paused ? video.play() : video.pause();
      } else {
        playChannel(channels[idx].url, channels[idx].name, idx);
      }
    }
    btn.addEventListener('touchstart', press, { passive:false });
    btn.addEventListener('click', press);
    gridEl.appendChild(btn);
  })(i);
}

/* ── Orientation: webkit fullscreen on landscape ── */
window.addEventListener('orientationchange', function() {
  setTimeout(function() {
    var isLandscape = window.innerWidth > window.innerHeight;
    if (isLandscape) {
      if (video.webkitEnterFullscreen) {
        video.webkitEnterFullscreen();
      } else if (video.requestFullscreen) {
        video.requestFullscreen();
      }
    } else {
      exitFS();
    }
  }, 200);
});

/* also catch the case where user exits fullscreen manually */
document.addEventListener('webkitfullscreenchange', function() {
  if (!document.webkitFullscreenElement && !video.webkitDisplayingFullscreen) {
    restorePortrait();
  }
});
document.addEventListener('fullscreenchange', function() {
  if (!document.fullscreenElement) {
    restorePortrait();
  }
});
video.addEventListener('webkitendfullscreen', function() {
  restorePortrait();
});

function exitFS() {
  if (video.webkitExitFullscreen) {
    video.webkitExitFullscreen();
  } else if (document.webkitExitFullscreen) {
    document.webkitExitFullscreen();
  } else if (document.exitFullscreen && document.fullscreenElement) {
    document.exitFullscreen();
  }
  restorePortrait();
}

function restorePortrait() {
  document.getElementById('hdr').style.display = '';
  document.getElementById('grid').style.display = '';
  document.getElementById('pwrap').removeAttribute('style');
}

/* ── Autostart ARD on load ── */
window.onload = function() {
  setTimeout(function() {
    playChannel(channels[0].url, channels[0].name, 0);
  }, 400);
};
</script>
</body>
</html>
