<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HAUSEN AM STREAM</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap');
        
        * { box-sizing: border-box; margin:0; padding:0; }
        
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(180deg, #f0f4fa, #e6edf7);
            color: #1e3a8a;
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        .top-bar {
            background: rgba(30, 58, 138, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            text-align: center;
            padding: 14px 10px;
            font-size: 1.4rem;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            letter-spacing: -0.5px;
        }
        
        .main {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 58px);
        }
        
        .player-area {
            flex: 0 0 42vh;
            background: #0a0a0a;
            position: relative;
            min-height: 240px;
            box-shadow: inset 0 4px 30px rgba(0,0,0,0.6);
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .channel-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: white;
            padding: 14px 18px;
            font-size: 1.65rem;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        .channel-list {
            flex: 1;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 16px 14px 14px;
            display: flex;
            flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.6);
        }
        
        .channel-list h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #1e40af;
            text-align: center;
            margin-bottom: 14px;
            opacity: 0.85;
        }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            flex: 1;
            align-content: stretch;
        }
        
        .channel-btn {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e40af;
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1.5px solid rgba(255,255,255,0.75);
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.15),
                        inset 0 2px 8px rgba(255,255,255,0.9);
            padding: 12px;
            line-height: 1.1;
            text-align: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-user-select: none;
        }
        
        .channel-btn:active {
            transform: scale(0.94) translateY(2px);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.25);
            background: rgba(255,255,255,0.85);
        }
        
        /* Perfekte Anpassung an Höhe & Breite */
        @media (max-width: 767px) {
            .player-area { flex: 0 0 40vh; }
            .channel-btn { font-size: 1.18rem; }
            .buttons-grid { gap: 12px; }
        }
        
        @media (min-width: 768px) {
            .buttons-grid { grid-template-columns: repeat(3, 1fr); }
            .channel-btn { font-size: 1.42rem; }
        }
        
        /* Extra Sicherheit für Rotation */
        @media (orientation: landscape) {
            .player-area { flex: 0 0 100vh; }
            .channel-list { display: none; }
        }
        
        @media (orientation: portrait) {
            .player-area { flex: 0 0 42vh; }
            .channel-list { display: flex; }
        }
    </style>
</head>
<body>
    <div class="top-bar">HAUSEN AM STREAM</div>
    
    <div class="main">
        <!-- PLAYER -->
        <div class="player-area">
            <video id="video" controls autoplay playsinline></video>
            <div id="current-channel" class="channel-name">Kanal auswählen →</div>
        </div>
        
        <!-- 9 GLASMORPHIC KNÖPFE – passen sich perfekt an -->
        <div class="channel-list">
          
            <div class="buttons-grid" id="buttons-grid"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        let hlsPlayer = null;
        
        function playChannel(url, name) {
            document.getElementById('current-channel').textContent = name;
            
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            
            if (Hls.isSupported()) {
                hlsPlayer = new Hls({ 
                    lowLatencyMode: true, 
                    maxBufferLength: 30,
                    backBufferLength: 30
                });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                });
            } else {
                video.src = url;
                video.play().catch(() => {});
            }
        }
        
        const channels = [
            {name: "ARD",          url: "https://daserste-live.ard-mcdn.de/daserste/live/hls/de/master.m3u8"},
            {name: "ZDF",          url: "https://zdf-hls-15.akamaized.net/hls/live/2016498/de/high/master.m3u8"},
            {name: "SWR BW",       url: "https://swrbwd-hls.akamaized.net/hls/live/2018672/swrbwd/master.m3u8"},
            {name: "PHOENIX",      url: "https://zdf-hls-19.akamaized.net/hls/live/2016502/de/high/master.m3u8"},
            {name: "NDR Niedersachsen", url: "https://mcdn.ndr.de/ndr/hls/ndr_fs/ndr_nds/master.m3u8"},
            {name: "BR Süd",       url: "https://mcdn.br.de/br/fs/bfs_sued/hls/de/master.m3u8"},
            {name: "WDR (weltweit)", url: "https://mcdn.wdr.de/wdr/wdrfs/de/master.m3u8"},
            {name: "ARTE DE",      url: "https://artesimulcast.akamaized.net/hls/live/2030993/artelive_de/index.m3u8"},
            {name: "3Sat",         url: "https://zdf-hls-18.akamaized.net/hls/live/2016501/dach/high/master.m3u8"}
        ];
        
        function createButtons() {
            const grid = document.getElementById('buttons-grid');
            grid.innerHTML = '';
            
            channels.forEach(ch => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                btn.textContent = ch.name;
                btn.addEventListener('click', () => playChannel(ch.url, ch.name));
                grid.appendChild(btn);
            });
        }
        
        // === VOLLBILD + AUTOMATISCHES ZURÜCKWECHSELN ===
        function handleOrientation() {
            let lastOrientation = window.orientation;
            
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    const isPortrait = (window.innerHeight > window.innerWidth);
                    
                    if (isPortrait && (document.fullscreenElement || document.webkitFullscreenElement)) {
                        if (video.webkitExitFullscreen) video.webkitExitFullscreen();
                        else if (document.exitFullscreen) document.exitFullscreen();
                    } else if (!isPortrait) {
                        if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
                        else if (video.requestFullscreen) video.requestFullscreen();
                    }
                }, 250);
            });
        }
        
        // START
        window.onload = () => {
            createButtons();
            handleOrientation();
            
            // ARD startet automatisch
            setTimeout(() => {
                playChannel(channels[0].url, channels[0].name);
            }, 500);
        };
    </script>
</body>
</html>
