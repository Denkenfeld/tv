<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HAUSEN AM STREAM</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Arial:wght@700&display=swap');
        
        * { box-sizing: border-box; margin:0; padding:0; }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f8f8f8;
            color: #222;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            height: 100vh;
        }
        
        .top-bar {
            background: #003087;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 1.35rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .main {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 48px);
        }
        
        .player-area {
            flex: 0 0 42vh;
            background: #000;
            position: relative;
            min-height: 260px;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .channel-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,48,135,0.92);
            color: white;
            padding: 12px 15px;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        
        .channel-list {
            flex: 1;
            background: white;
            padding: 15px 12px 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .channel-list h2 {
            font-size: 1.35rem;
            color: #003087;
            text-align: center;
            margin-bottom: 12px;
        }
        
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            flex: 1;
        }
        
        .channel-btn {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.28rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #0077cc, #0055aa);
            border: none;
            border-radius: 18px;
            box-shadow: 0 6px 16px rgba(0,119,204,0.4);
            padding: 10px;
            line-height: 1.1;
            text-align: center;
            transition: transform 0.08s ease;
            -webkit-user-select: none;
        }
        
        .channel-btn:active {
            transform: scale(0.92);
            background: linear-gradient(135deg, #0099ff, #0077cc);
        }
        
        /* iPhone & kleine Handys – alles passt ohne Scrollen */
        @media (max-width: 767px) {
            .player-area { flex: 0 0 40vh; }
            .channel-btn { font-size: 1.22rem; }
        }
        
        /* Tablet/Desktop – noch größer */
        @media (min-width: 768px) {
            .buttons-grid { grid-template-columns: repeat(3, 1fr); }
            .channel-btn { font-size: 1.45rem; }
        }
    </style>
</head>
<body>
    <div class="top-bar">HAUSEN AM STREAM</div>
    
    <div class="main">
        <!-- PLAYER -->
        <div class="player-area">
            <video id="video" controls autoplay playsinline></video>
            <div id="current-channel" class="channel-name">Kanal auswählen →</div>
        </div>
        
        <!-- 9 GROSSE KNÖPFE – passen perfekt ohne Scrollen -->
        <div class="channel-list">
      
            <div class="buttons-grid" id="buttons-grid"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        let hlsPlayer = null;
        
        function playChannel(url, name) {
            document.getElementById('current-channel').textContent = name;
            
            // Alten Player stoppen
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
            
            // HLS.js oder natives iPhone-Player
            if (Hls.isSupported()) {
                hlsPlayer = new Hls({ lowLatencyMode: true, maxBufferLength: 30 });
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
            } else {
                video.src = url;
                video.play().catch(() => {});
            }
        }
        
        // === DIE 9 KANÄLE (ZDF & PHOENIX jetzt https – läuft sicher) ===
        const channels = [
            {name: "ARD",          url: "https://daserste-live.ard-mcdn.de/daserste/live/hls/de/master.m3u8"},
            {name: "ZDF",          url: "https://zdf-hls-15.akamaized.net/hls/live/2016498/de/high/master.m3u8"},
            {name: "SWR BW",       url: "https://swrbwd-hls.akamaized.net/hls/live/2018672/swrbwd/master.m3u8"},
            {name: "PHOENIX",      url: "https://zdf-hls-19.akamaized.net/hls/live/2016502/de/high/master.m3u8"},
            {name: "NDR Niedersachsen", url: "https://mcdn.ndr.de/ndr/hls/ndr_fs/ndr_nds/master.m3u8"},
            {name: "BR Süd",       url: "https://mcdn.br.de/br/fs/bfs_sued/hls/de/master.m3u8"},
            {name: "WDR (weltweit)", url: "https://mcdn.wdr.de/wdr/wdrfs/de/master.m3u8"},
            {name: "ARTE DE",      url: "https://artesimulcast.akamaized.net/hls/live/2030993/artelive_de/index.m3u8"},
            {name: "3Sat",         url: "https://zdf-hls-18.akamaized.net/hls/live/2016501/dach/high/master.m3u8"}
        ];
        
        function createButtons() {
            const grid = document.getElementById('buttons-grid');
            grid.innerHTML = '';
            
            channels.forEach(ch => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                btn.textContent = ch.name;
                btn.addEventListener('click', () => playChannel(ch.url, ch.name));
                grid.appendChild(btn);
            });
        }
        
        // === VOLLBILD AUTOMATISCH BEIM DREHEN ===
        function goFullscreenOnRotate() {
            window.addEventListener('resize', () => {
                const isLandscape = window.innerWidth > window.innerHeight;
                if (isLandscape) {
                    if (video.webkitEnterFullscreen) {
                        video.webkitEnterFullscreen();
                    } else if (video.requestFullscreen) {
                        video.requestFullscreen();
                    }
                }
            });
        }
        
        // START
        window.onload = () => {
            createButtons();
            goFullscreenOnRotate();
            
            // ARD startet automatisch (nach 0,6 Sek. – funktioniert auch auf iPhone)
            setTimeout(() => {
                playChannel(channels[0].url, channels[0].name);
            }, 600);
        };
    </script>
</body>
</html>
