<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HAUSEN AM STREAM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0d1018;color:#eee8d8;font-family:Georgia,serif;overflow:hidden}

/* HEADER */
#hdr{
  background:#161b28;
  border-bottom:3px solid #f0a500;
  padding:11px 14px 10px;
  display:flex;align-items:center;gap:10px;
}
#hdr h1{
  font-size:clamp(1rem,5.5vw,1.5rem);
  font-weight:bold;
  color:#f0a500;
  letter-spacing:.04em;
}
.dot{
  width:10px;height:10px;
  background:#e63946;border-radius:50%;flex-shrink:0;
  animation:bl 1.4s infinite;
}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.15}}

/* PLAYER */
#pwrap{
  background:#000;
  position:relative;
  width:100%;
}
#vid{
  display:block;width:100%;height:100%;
  object-fit:contain;background:#000;
}

/* SPINNER */
#spin{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);
  opacity:0;transition:opacity .2s;pointer-events:none;
}
#spin.on{opacity:1}
.ring{
  width:52px;height:52px;
  border:4px solid rgba(240,165,0,.2);
  border-top-color:#f0a500;
  border-radius:50%;
  animation:sp .8s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* ERROR */
#err{
  position:absolute;inset:0;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;background:rgba(0,0,0,.85);
  font-size:clamp(.9rem,4vw,1.05rem);
  text-align:center;padding:20px;line-height:1.5;
}
#err.on{display:flex}
#err .ico{font-size:2.5rem}

/* NOW PLAYING */
#now{
  background:#161b28;
  border-bottom:1px solid #252d45;
  padding:7px 14px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-shrink:0;
}
#nowname{
  font-size:clamp(1.1rem,6vw,1.5rem);
  font-weight:bold;color:#f0a500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#mute{
  width:48px;height:48px;
  background:#1e2438;border:2px solid #252d45;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.5rem;user-select:none;flex-shrink:0;
}
#mute:active{transform:scale(.93)}

/* GRID */
#grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:6px;padding:6px;
  flex:1;min-height:0;
}
.cb{
  background:#1e2438;
  border:2px solid #252d45;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:4px;
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
  transition:background .1s,transform .08s;
}
.cb span{
  font-size:clamp(.7rem,3.8vw,1rem);
  font-weight:bold;color:#eee8d8;
  text-align:center;line-height:1.25;
  pointer-events:none;
}
.cb.active{background:#f0a500;border-color:#f0a500}
.cb.active span{color:#0d1018}
.cb:active{transform:scale(.93)}

/* LANDSCAPE: fullscreen video only */
@media (orientation:landscape){
  #hdr,#now,#grid{display:none!important}
  body{overflow:hidden}
  #pwrap{
    position:fixed!important;
    inset:0!important;
    width:100vw!important;
    height:100vh!important;
    z-index:999;
  }
}
</style>
</head>
<body>

<div id="hdr">
  <div class="dot"></div>
  <h1>HAUSEN AM STREAM</h1>
</div>

<div id="pwrap">
  <video id="vid" playsinline autoplay muted controls></video>
  <div id="spin" class="on"><div class="ring"></div></div>
  <div id="err">
    <span class="ico">&#128225;</span>
    <span>Sender konnte nicht geladen werden.<br>Bitte anderen Sender wählen.</span>
  </div>
</div>

<div id="now">
  <div id="nowname">Wird geladen &#8230;</div>
  <div id="mute">&#128266;</div>
</div>

<div id="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<script>
var CH = [
  {n:"ARD",     u:"https://daserste-live.ard-mcdn.de/daserste/live/hls/de/master.m3u8"},
  {n:"ZDF",     u:"https://zdf-hls-15.akamaized.net/hls/live/2016498/de/high/master.m3u8"},
  {n:"SWR BW",  u:"https://swrbwd-hls.akamaized.net/hls/live/2018672/swrbwd/master.m3u8"},
  {n:"PHOENIX", u:"https://zdf-hls-19.akamaized.net/hls/live/2016502/de/high/master.m3u8"},
  {n:"NDR",     u:"https://mcdn.ndr.de/ndr/hls/ndr_fs/ndr_nds/master.m3u8"},
  {n:"BR Süd",  u:"https://mcdn.br.de/br/fs/bfs_sued/hls/de/master.m3u8"},
  {n:"WDR",     u:"https://wdrfs247.akamaized.net/hls/live/681509/wdr_msl4_fs247/index.m3u8"},
  {n:"ARTE DE", u:"https://artesimulcast.akamaized.net/hls/live/2030993/artelive_de/index.m3u8"},
  {n:"3sat",    u:"https://zdf-hls-18.akamaized.net/hls/live/2016501/dach/high/master.m3u8"}
];

var vid      = document.getElementById("vid");
var spinEl   = document.getElementById("spin");
var errEl    = document.getElementById("err");
var nowEl    = document.getElementById("nowname");
var muteEl   = document.getElementById("mute");
var gridEl   = document.getElementById("grid");
var pwrap    = document.getElementById("pwrap");
var hdr      = document.getElementById("hdr");
var nowBar   = document.getElementById("now");

var hls      = null;
var curIdx   = -1;
var muted    = false;

function sizePlayer() {
  if (window.innerWidth > window.innerHeight) return;
  var total  = window.innerHeight;
  var hdrH   = hdr.offsetHeight;
  var nowH   = nowBar.offsetHeight;
  var avail  = total - hdrH - nowH;
  pwrap.style.height = Math.floor(avail * 0.46) + "px";
}

function loadCh(i) {
  if (curIdx >= 0) {
    var old = document.getElementById("b"+curIdx);
    if (old) old.classList.remove("active");
  }
  curIdx = i;
  var btn = document.getElementById("b"+i);
  if (btn) btn.classList.add("active");
  nowEl.textContent = CH[i].n;
  errEl.classList.remove("on");
  spinEl.classList.add("on");
  if (hls) { hls.destroy(); hls = null; }
  if (window.Hls && Hls.isSupported()) {
    hls = new Hls({enableWorker:false,lowLatencyMode:true});
    hls.loadSource(CH[i].u);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      vid.muted = muted;
      vid.play().catch(function(){});
    });
    hls.on(Hls.Events.ERROR, function(e,d) {
      if (d.fatal) { spinEl.classList.remove("on"); errEl.classList.add("on"); }
    });
  } else if (vid.canPlayType("application/vnd.apple.mpegurl")) {
    vid.src = CH[i].u;
    vid.muted = muted;
    vid.play().catch(function(){});
  } else {
    spinEl.classList.remove("on");
    errEl.classList.add("on");
  }
}

vid.addEventListener("playing", function(){ spinEl.classList.remove("on"); });
vid.addEventListener("waiting", function(){ spinEl.classList.add("on"); });
vid.addEventListener("error",   function(){ spinEl.classList.remove("on"); errEl.classList.add("on"); });

muteEl.addEventListener("click", function() {
  muted = !muted;
  vid.muted = muted;
  muteEl.innerHTML = muted ? "&#128263;" : "&#128266;";
});

for (var j = 0; j < CH.length; j++) {
  (function(idx) {
    var btn = document.createElement("button");
    btn.className = "cb";
    btn.id = "b" + idx;
    var sp = document.createElement("span");
    sp.textContent = CH[idx].n;
    btn.appendChild(sp);
    btn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      if (idx === curIdx) { vid.paused ? vid.play() : vid.pause(); }
      else { loadCh(idx); }
    }, {passive:false});
    btn.addEventListener("click", function() {
      if (idx === curIdx) { vid.paused ? vid.play() : vid.pause(); }
      else { loadCh(idx); }
    });
    gridEl.appendChild(btn);
  })(j);
}

window.addEventListener("resize", sizePlayer);
setTimeout(function(){ sizePlayer(); loadCh(0); }, 200);
</script>
</body>
</html>
